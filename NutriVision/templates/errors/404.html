<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page not found · NutriVision</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="error-shell">
  <div class="code">404</div>
  <h2>We couldn't find that page</h2>
  <p>The link might be broken, or the page may have moved. Let's get you back on track.</p>
  <a class="btn btn-primary" href="{{ url_for('dashboard.home') if current_user.is_authenticated else url_for('auth.login') }}">Back to NutriVision</a>
</div>
</body>
</html>
